<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistem Keamanan Jaringan — Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #fdf6ec; --surface: #fff8f0;
    --border: #e8d9c0; --border-hover: #c4a882;
    --text-primary: #2c1f0e; --text-secondary: #8b6a40;
    --text-tertiary: #c4a882; --accent: #8b5e30;
    --accent-bg: #f0e0c4; --accent-light: #d4b896;
    --divider: #ede0cc; --radius-md: 8px; --radius-lg: 14px;
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text-primary); min-height: 100vh; display: flex; flex-direction: column; }
  nav { padding: 1.25rem 2rem; display: flex; align-items: center; justify-content: space-between; border-bottom: 0.5px solid var(--border); background: var(--surface); }
  .back { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text-tertiary); text-decoration: none; transition: color 0.15s; }
  .back:hover { color: var(--text-primary); }
  .nav-title { display: inline-flex; align-items: center; gap: 6px; background: var(--accent-bg); color: var(--accent); font-size: 11px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; padding: 4px 12px; border-radius: 99px; }
  .split { flex: 1; display: grid; grid-template-columns: 1fr 1fr; }
  .panel { padding: 2rem 2.5rem 3rem; }
  .panel-left { border-right: 0.5px solid var(--divider); }
  .panel-header { margin-bottom: 1.75rem; }
  .panel-label { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-tertiary); margin-bottom: 0.4rem; }
  .panel-title { font-family: 'DM Serif Display', serif; font-size: 1.5rem; font-weight: 400; line-height: 1.2; color: var(--text-primary); }
  .panel-title em { font-style: italic; color: var(--text-secondary); }
  .panel-divider { height: 0.5px; background: var(--border); margin-bottom: 1.25rem; }
  .list { display: flex; flex-direction: column; gap: 0.5rem; }
  .item { display: flex; align-items: center; gap: 0.85rem; padding: 0.85rem 1rem; background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); text-decoration: none; color: inherit; transition: border-color 0.15s, transform 0.12s; }
  .item.available:hover { border-color: var(--border-hover); transform: translateX(3px); }
  .item.coming { opacity: 0.45; cursor: default; pointer-events: none; }
  .week-badge { min-width: 40px; height: 40px; border-radius: var(--radius-md); background: var(--accent-bg); display: flex; align-items: center; justify-content: center; flex-direction: column; flex-shrink: 0; }
  .wnum { font-family: 'DM Serif Display', serif; font-size: 1rem; color: var(--accent); line-height: 1; }
  .wlabel { font-size: 8px; color: var(--accent-light); letter-spacing: 0.05em; text-transform: uppercase; }
  .item-info { flex: 1; }
  .item-week { font-size: 10px; color: var(--text-tertiary); margin-bottom: 1px; }
  .item-title { font-size: 14px; font-weight: 500; color: var(--text-primary); line-height: 1.3; }
  .item-arrow { font-size: 13px; color: var(--text-tertiary); transition: transform 0.15s, color 0.15s; flex-shrink: 0; }
  .item.available:hover .item-arrow { transform: translateX(3px); color: var(--accent); }
  .pill { font-size: 10px; padding: 2px 8px; border-radius: 99px; font-weight: 500; flex-shrink: 0; background: #f0e8dc; color: var(--accent-light); }
  footer { padding: 1rem 2rem; border-top: 0.5px solid var(--border); font-size: 12px; color: var(--text-tertiary); background: var(--surface); text-align: center; }
  @media (max-width: 680px) { .split { grid-template-columns: 1fr; } .panel-left { border-right: none; border-bottom: 0.5px solid var(--divider); } .panel { padding: 1.5rem; } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .item { animation: fadeUp 0.35s ease both; }
</style>
</head>
<body>
<nav>
  <a class="back" href="../index.html">← Beranda</a>
  <div class="nav-title">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="11" width="18" height="10" rx="2"/>
      <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      <circle cx="12" cy="16" r="1" fill="currentColor"/>
    </svg>
    Sistem Keamanan Jaringan
  </div>
  <span id="total" style="font-size:12px; color:var(--text-tertiary);"></span>
</nav>

<div class="split">
  <div class="panel panel-left">
    <div class="panel-header">
      <p class="panel-label">Bagian 1</p>
      <h2 class="panel-title">Sebelum <em>UTS</em></h2>
      <p style="font-size:13px; color:var(--text-tertiary); margin-top:4px;">Minggu 2 – 7</p>
    </div>
    <div class="panel-divider"></div>
    <div class="list" id="list-sebelum"></div>
  </div>
  <div class="panel panel-right">
    <div class="panel-header">
      <p class="panel-label">Bagian 2</p>
      <h2 class="panel-title">Setelah <em>UTS</em></h2>
      <p style="font-size:13px; color:var(--text-tertiary); margin-top:4px;">Minggu 9 – 15</p>
    </div>
    <div class="panel-divider"></div>
    <div class="list" id="list-setelah"></div>
  </div>
</div>

<footer>Arismunandar, <M class="T I"></M> &copy; 2026</footer>

<script>
function buatItem(d) {
  const aktif = d.file !== "";
  const label = d.demo > 0 ? `Pertemuan ${d.minggu} · Demo ${d.demo}` : `Pertemuan ${d.minggu}`;
  const judul = d.demo > 0 ? `Demo Minggu ${d.minggu} — Bagian ${d.demo}` : `Demo Minggu ${d.minggu}`;
  if (aktif) {
    return `<a class="item available" href="${d.file}">
      <div class="week-badge"><span class="wnum">${d.minggu}</span><span class="wlabel">Minggu</span></div>
      <div class="item-info"><p class="item-week">${label}</p><p class="item-title">${judul}</p></div>
      <span class="item-arrow">→</span>
    </a>`;
  } else {
    return `<div class="item coming">
      <div class="week-badge"><span class="wnum">${d.minggu}</span><span class="wlabel">Minggu</span></div>
      <div class="item-info"><p class="item-week">${label}</p><p class="item-title">${judul}</p></div>
      <span class="pill">Segera</span>
    </div>`;
  }
}

fetch('daftar.json')
  .then(r => r.json())
  .then(data => {
    document.getElementById('list-sebelum').innerHTML = data.sebelum_uts.map(buatItem).join('');
    document.getElementById('list-setelah').innerHTML = data.setelah_uts.map(buatItem).join('');
    const total = [...data.sebelum_uts, ...data.setelah_uts].filter(d => d.file !== "").length;
    document.getElementById('total').textContent = total + ' demo aktif';
  });
</script>
</body>
</html>
