<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>class.arismunandar.org</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #fdf6ec; --surface: #fff8f0;
    --border: #e8d9c0; --border-hover: #c4a882;
    --text-primary: #2c1f0e; --text-secondary: #8b6a40;
    --text-tertiary: #c4a882; --accent: #8b5e30;
    --accent-bg: #f0e0c4; --radius-md: 8px; --radius-lg: 14px;
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text-primary); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 3rem 1.5rem; }
  .eyebrow { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-tertiary); margin-bottom: 1rem; text-align: center; }
  h1 { font-family: 'DM Serif Display', serif; font-size: clamp(2rem, 6vw, 3rem); font-weight: 400; text-align: center; line-height: 1.15; margin-bottom: 0.6rem; color: var(--text-primary); }
  h1 em { font-style: italic; color: var(--text-secondary); }
  .subtitle { font-size: 15px; color: var(--text-secondary); text-align: center; font-weight: 300; margin-bottom: 3rem; max-width: 360px; }
  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 1.25rem; width: 100%; max-width: 620px; }
  .card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1.75rem 1.5rem 1.5rem; cursor: pointer; transition: border-color 0.2s, transform 0.15s; display: flex; flex-direction: column; gap: 0.75rem; text-decoration: none; color: inherit; position: relative; overflow: hidden; }
  .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--accent); opacity: 0; transition: opacity 0.2s; }
  .card:hover { border-color: var(--border-hover); transform: translateY(-2px); }
  .card:hover::before { opacity: 1; }
  .icon { width: 40px; height: 40px; border-radius: var(--radius-md); background: var(--accent-bg); display: flex; align-items: center; justify-content: center; }
  .card-label { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-tertiary); }
  .card-name { font-family: 'DM Serif Display', serif; font-size: 1.35rem; font-weight: 400; line-height: 1.2; color: var(--text-primary); }
  .card-desc { font-size: 13px; color: var(--text-secondary); font-weight: 300; line-height: 1.6; flex: 1; }
  .card-meta { font-size: 11px; color: var(--text-tertiary); }
  .card-arrow { font-size: 13px; color: var(--text-tertiary); display: flex; align-items: center; gap: 4px; margin-top: 0.5rem; transition: gap 0.2s, color 0.2s; }
  .card:hover .card-arrow { gap: 8px; color: var(--accent); }
  .divider { width: 40px; height: 0.5px; background: var(--border); margin: 2.5rem auto; }
  footer { font-size: 12px; color: var(--text-tertiary); text-align: center; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  .eyebrow { animation: fadeUp 0.5s ease both; }
  h1 { animation: fadeUp 0.5s 0.08s ease both; }
  .subtitle { animation: fadeUp 0.5s 0.14s ease both; }
  .cards { animation: fadeUp 0.5s 0.20s ease both; }
</style>
</head>
<body>
  <p class="eyebrow">class.arismunandar.org</p>
  <h1>Demo <em>Interaktif</em><br>Mata Kuliah</h1>
  <p class="subtitle">Pilih mata kuliah untuk melihat kumpulan demo dan materi per minggu.</p>

  <div class="cards">
    <a class="card" href="./siskamjar/index.html">
      <div class="icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#8b5e30" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="10" rx="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          <circle cx="12" cy="16" r="1" fill="#8b5e30"/>
        </svg>
      </div>
      <span class="card-label">Mata kuliah</span>
      <span class="card-name">Sistem Keamanan Jaringan</span>

      <span id="meta-siskamjar" class="card-meta"></span>
      <span class="card-arrow">Lihat demo <span>→</span></span>
    </a>

    <a class="card" href="./arkom/index.html">
      <div class="icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#8b5e30" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="4" y="4" width="6" height="6" rx="1"/>
          <rect x="14" y="4" width="6" height="6" rx="1"/>
          <rect x="4" y="14" width="6" height="6" rx="1"/>
          <rect x="14" y="14" width="6" height="6" rx="1"/>
        </svg>
      </div>
      <span class="card-label">Mata kuliah</span>
      <span class="card-name">Arsitektur Komputer</span>

      <span id="meta-arkom" class="card-meta"></span>
      <span class="card-arrow">Lihat demo <span>→</span></span>
    </a>
  </div>

  <div class="divider"></div>
  <footer>Arismunandar, M.T.I. &copy; 2026</footer>

<script>
function hitungAktif(data) {
  return [...data.sebelum_uts, ...data.setelah_uts].filter(d => d.file !== "").length;
}
fetch('./siskamjar/daftar.json').then(r => r.json()).then(data => {
  document.getElementById('meta-siskamjar').textContent = hitungAktif(data) + ' demo tersedia';
}).catch(() => {});
fetch('./arkom/daftar.json').then(r => r.json()).then(data => {
  document.getElementById('meta-arkom').textContent = hitungAktif(data) + ' demo tersedia';
}).catch(() => {});
</script>
</body>
</html>
